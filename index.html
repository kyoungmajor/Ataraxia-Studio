<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useMemo, useRef, useCallback } from "react";
    import { createRoot } from "react-dom/client";
    import * as LucideAll from "lucide-react";

    const __ICONS = LucideAll;
    const __components = {};

    // ===== Portfolio =====
    (() => {
      const { ShoppingBag, Bot, ArrowUpRight, Menu, X, Terminal, Zap, GitBranch, Hammer, ShieldCheck, Check, Wrench, Activity, TrendingUp, Send, CheckCircle2, Mail, MessageSquare, Sparkles, Wifi, Radio, Compass } = __ICONS;

// ============================================================
// LINDY / LEAD CONFIG — swap in your real values here
// ============================================================
//
// >>> n8n / WEBHOOK SETUP (when you're ready) <<<
// 1. In n8n, build a workflow that starts with a "Webhook" trigger
//    set to POST and "Respond Immediately".
// 2. Activate the workflow and copy its **Production Webhook URL**.
//    It looks like: https://YOUR-N8N-HOST/webhook/abc123-xyz
// 3. Paste that URL into `webhookUrl` below (replacing the empty string).
// 4. Wire downstream n8n nodes to: send email to `leadEmail`,
//    push to a Google Sheet / CRM, ping Slack, etc.
// 5. Until `webhookUrl` is filled in, the form auto-falls back to
//    a structured `mailto:` so no leads are dropped.
//
const LINDY_CONFIG = {
  // POST endpoint that receives form submissions. Could be an n8n
  // production webhook, a Lindy/Zapier/Make webhook, or your own API.
  // Leave as "" to disable the POST and fall through to the mailto fallback.
  webhookUrl: "https://public.lindy.ai/api/v1/webhooks/lindy/9b98d59f-e67c-43fb-a3ac-71a893252dbe",

  // Where lead notification emails go (used as the mailto fallback +
  // included in the webhook payload as `notifyEmail`). When the
  // webhook is not configured, clicking Submit opens the user's mail
  // client with a fully-formatted lead brief addressed here.
  leadEmail: "ceokylehawkins@gmail.com",

  // Optional: Lindy chat embed URL (used in the floating concierge).
  // If empty, the concierge shows a placeholder ready for embed.
  chatEmbedUrl: "", // e.g. "https://chat.lindy.ai/embed/abc123"

  // Business types treated as "high priority" leads.
  highPriorityTypes: ["Liquor store", "Wine / spirits shop", "Specialty retail"],
};

// ============================================================
// MARKET BIAS — Manual Override (no live n8n yet)
// ============================================================
// Update these values by hand whenever your read of the market shifts.
// They drive the "System Status" panel in The Lab section.
// Allowed `tone`: "bullish" | "neutral" | "cautious"
const MARKET_BIAS = {
  label: "BFCM build-out — leaning Shopify migrations",
  tone: "bullish",
  updated: "April 2026",
};

// Helper: should this lead be flagged high priority?
const isHighPriorityLead = (businessType) =>
  LINDY_CONFIG.highPriorityTypes.includes(businessType);

// ===== Form helpers =====
const inputClass =
  "w-full bg-white/[0.03] border border-white/10 rounded-lg px-3.5 py-2.5 text-sm text-white placeholder:text-neutral-600 focus:outline-none focus:border-cyan-400/50 focus:bg-white/[0.05] focus:ring-2 focus:ring-cyan-400/10 transition-all";

const selectClass = `${inputClass} appearance-none bg-no-repeat bg-[right_0.75rem_center] pr-9 cursor-pointer`;

function Field({ label, hint, required, children }) {
  return (
    <label className="block">
      <span className="flex items-baseline justify-between mb-1.5">
        <span className="text-xs uppercase tracking-[0.14em] text-neutral-400">
          {label}
          {required && <span className="text-cyan-400 ml-1">*</span>}
        </span>
        {hint && <span className="text-[10px] text-neutral-600">{hint}</span>}
      </span>
      {children}
    </label>
  );
}

function Portfolio() {
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [mouse, setMouse] = useState({ x: 50, y: 30 });

  // Quote form state
  const [form, setForm] = useState({
    name: "",
    email: "",
    phone: "",
    business: "",
    businessType: "",
    scope: [],
    timeline: "",
    budget: "",
    message: "",
  });
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");

  // Lindy concierge chat state
  const [chatOpen, setChatOpen] = useState(false);

  const updateField = (key, value) =>
    setForm((f) => ({ ...f, [key]: value }));
  const toggleScope = (s) =>
    setForm((f) => ({
      ...f,
      scope: f.scope.includes(s)
        ? f.scope.filter((x) => x !== s)
        : [...f.scope, s],
    }));

  // Build a normalized lead payload for webhooks / email
  const buildLeadPayload = () => {
    const priority = isHighPriorityLead(form.businessType)
      ? "HIGH"
      : "STANDARD";
    return {
      name: form.name,
      email: form.email,
      phone: form.phone,
      business: form.business,
      businessType: form.businessType,
      scope: form.scope,
      timeline: form.timeline,
      budget: form.budget,
      message: form.message,
      priority,
      isHighPriority: priority === "HIGH",
      submittedAt: new Date().toISOString(),
      source: "devataraxia.com / Request a Quote",
      notifyEmail: LINDY_CONFIG.leadEmail,
    };
  };

  // Build a mailto: fallback link (used if no webhook is configured,
  // or as the user-visible "email me directly" option).
  //
  // The body is intentionally structured into bracketed sections so the
  // recipient (you) can copy-paste the full email directly into Claude
  // and ask for a fast triage / proposal-draft pass.
  const buildLeadMailto = (payload) => {
    const flag = payload.isHighPriority ? "[HIGH PRIORITY] " : "";
    const subject = `${flag}New Ataraxia Lead — ${
      payload.business || "Unnamed business"
    }${payload.businessType ? ` (${payload.businessType})` : ""}`;

    const priorityBanner = payload.isHighPriority
      ? "⚡ HIGH PRIORITY LEAD — matches Ataraxia's target retail vertical (liquor / wine / specialty).\n\n"
      : "";

    const scopeList =
      payload.scope && payload.scope.length
        ? payload.scope.map((s) => `  - ${s}`).join("\n")
        : "  - (none specified)";

    const body =
      `${priorityBanner}` +
      `=== ATARAXIA STUDIO — INBOUND LEAD ===\n` +
      `Submitted: ${payload.submittedAt}\n` +
      `Source:    ${payload.source}\n` +
      `Priority:  ${payload.priority}${
        payload.isHighPriority ? " ⚡" : ""
      }\n\n` +
      `[CONTACT]\n` +
      `Name:    ${payload.name || "—"}\n` +
      `Email:   ${payload.email || "—"}\n` +
      `Phone:   ${payload.phone || "—"}\n\n` +
      `[BUSINESS]\n` +
      `Name:    ${payload.business || "—"}\n\n` +
      `[BUSINESS TYPE]\n` +
      `${payload.businessType || "—"}\n\n` +
      `[PROJECT SCOPE]\n` +
      `${scopeList}\n\n` +
      `[TIMELINE]\n` +
      `${payload.timeline || "—"}\n\n` +
      `[BUDGET]\n` +
      `${payload.budget || "—"}\n\n` +
      `[MESSAGE FROM PROSPECT]\n` +
      `${payload.message || "—"}\n\n` +
      `[RAW FORM DATA — JSON]\n` +
      `${JSON.stringify(payload, null, 2)}\n\n` +
      `=== END LEAD ===\n` +
      `Tip: paste this entire email into Claude with the\n` +
      `"Ataraxia lead triage" system prompt for a fast read.\n`;

    return `mailto:${LINDY_CONFIG.leadEmail}?subject=${encodeURIComponent(
      subject
    )}&body=${encodeURIComponent(body)}`;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setSubmitError("");
    setSubmitting(true);

    const payload = buildLeadPayload();

    try {
      // PRIMARY: Formsubmit — delivers directly to ceokylehawkins@gmail.com.
      // NOTE: The very first submission triggers a one-time activation email to
      // ceokylehawkins@gmail.com — click the link once and all future submissions
      // fire automatically.
      const fsRes = await fetch("https://formsubmit.co/ajax/ceokylehawkins@gmail.com", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify({
          name: payload.name,
          email: payload.email,
          phone: payload.phone || "",
          company: payload.business || "",
          businessType: payload.businessType || "",
          scope: Array.isArray(payload.scope) ? payload.scope.join(", ") : payload.scope || "",
          timeline: payload.timeline || "",
          budget: payload.budget || "",
          message: payload.message || "",
          _subject: `New Lead from devataraxia.com — ${payload.name}`,
          _captcha: "false",
          _template: "table",
        }),
      });
      if (!fsRes.ok) throw new Error(`Formsubmit returned ${fsRes.status}`);

      console.log("[Lead submitted via Formsubmit]", payload);

      // SECONDARY: Also fire Lindy webhook in the background (non-blocking).
      // Lindy billing is currently paused — kept here so it resumes automatically
      // once billing is restored without any code changes needed.
      if (LINDY_CONFIG.webhookUrl) {
        fetch(LINDY_CONFIG.webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        }).catch((err) => console.warn("[Lindy secondary attempt failed — will retry when billing restored]", err.message));
      }

      setSubmitted(true);
    } catch (err) {
      console.error("Formsubmit submission failed:", err);
      setSubmitError(
        "Connection issue. Please email ceokylehawkins@gmail.com directly."
      );
    } finally {
      setSubmitting(false);
    }
  };

  const resetForm = () => {
    setForm({
      name: "",
      email: "",
      phone: "",
      business: "",
      businessType: "",
      scope: [],
      timeline: "",
      budget: "",
      message: "",
    });
    setSubmitted(false);
    setSubmitError("");
  };

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    const onMove = (e) =>
      setMouse({
        x: (e.clientX / window.innerWidth) * 100,
        y: (e.clientY / window.innerHeight) * 100,
      });
    window.addEventListener("scroll", onScroll);
    window.addEventListener("mousemove", onMove);
    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("mousemove", onMove);
    };
  }, []);

  // Smooth-scroll handler with offset for the fixed nav (h-16 = 64px).
  // Falls back gracefully if the target id isn't on this page.
  const handleNavClick = (e, href) => {
    if (!href || !href.startsWith("#")) return;
    const id = href.slice(1);
    const el = document.getElementById(id);
    if (!el) return; // let the browser do nothing rather than navigate
    e.preventDefault();
    const top =
      el.getBoundingClientRect().top + window.scrollY - 72; // 64 nav + 8 breathing room
    window.scrollTo({ top, behavior: "smooth" });
    // Update the URL hash without jumping
    if (history.replaceState) history.replaceState(null, "", href);
    setMenuOpen(false);
  };

  const navLinks = [
    { label: "Home", href: "#home" },
    { label: "The Lab", href: "#lab" },
    { label: "Services", href: "#services" },
    { label: "Contact", href: "#contact" },
  ];

  const services = [
    {
      icon: ShoppingBag,
      title: "Shopify & POS Integration",
      tag: "Commerce Engineering",
      description:
        "Unified retail systems that bridge in-store and online operations. Custom Shopify apps, real-time inventory sync, and POS integrations engineered for scale.",
      capabilities: [
        "Headless Shopify storefronts",
        "Real-time inventory & order sync",
        "Custom POS workflows",
        "Multi-location architecture",
      ],
    },
    {
      icon: Bot,
      title: "Custom AI Agents",
      tag: "Applied Intelligence",
      description:
        "Production-grade AI agents tailored to your operations. From customer support automation to internal copilots — built with modern LLM infrastructure and reliable evaluation.",
      capabilities: [
        "RAG & tool-use pipelines",
        "Workflow automation agents",
        "Domain-specific copilots",
        "Eval & monitoring systems",
      ],
    },
  ];

  return (
    <div className="min-h-screen bg-neutral-950 text-neutral-100 font-sans antialiased selection:bg-cyan-400/30 selection:text-white relative overflow-x-hidden">
      {/* Ambient gradient field */}
      <div
        className="pointer-events-none fixed inset-0 z-0 opacity-60"
        style={{
          background: `radial-gradient(600px circle at ${mouse.x}% ${mouse.y}%, rgba(34,211,238,0.08), transparent 40%)`,
        }}
      />
      {/* Grid texture */}
      <div
        className="pointer-events-none fixed inset-0 z-0 opacity-[0.025]"
        style={{
          backgroundImage:
            "linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px)",
          backgroundSize: "48px 48px",
        }}
      />
      {/* Top glow */}
      <div className="pointer-events-none absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-cyan-500/10 blur-[120px] rounded-full z-0" />

      {/* ===================== NAVIGATION ===================== */}
      <nav
        className={`fixed top-0 inset-x-0 z-50 transition-all duration-300 ${
          scrolled
            ? "bg-neutral-950/70 backdrop-blur-xl border-b border-white/5"
            : "bg-transparent"
        }`}
      >
        <div className="max-w-7xl mx-auto px-6 lg:px-10 h-16 flex items-center justify-between">
          <a
            href="#home"
            onClick={(e) => handleNavClick(e, "#home")}
            className="flex items-center gap-2 group"
          >
            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
              <Terminal className="w-4 h-4 text-neutral-950" strokeWidth={2.5} />
            </div>
            <span className="text-sm font-medium tracking-tight text-neutral-200 group-hover:text-white transition-colors">
              ataraxia<span className="text-cyan-400">.dev</span>
            </span>
          </a>

          <ul className="hidden md:flex items-center gap-1">
            {navLinks.map((l) => (
              <li key={l.label}>
                <a
                  href={l.href}
                  onClick={(e) => handleNavClick(e, l.href)}
                  className="px-4 py-2 text-sm text-neutral-400 hover:text-white transition-colors rounded-md hover:bg-white/5"
                >
                  {l.label}
                </a>
              </li>
            ))}
          </ul>

          <div className="hidden md:flex items-center gap-3">
            <a
              href="#contact"
              onClick={(e) => handleNavClick(e, "#contact")}
              className="group inline-flex items-center gap-1.5 text-xs font-medium text-neutral-950 bg-white hover:bg-cyan-300 transition-colors px-4 py-2 rounded-md"
            >
              Start a project
              <ArrowUpRight className="w-3.5 h-3.5 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" />
            </a>
          </div>

          <button
            onClick={() => setMenuOpen((v) => !v)}
            className="md:hidden w-9 h-9 inline-flex items-center justify-center rounded-md text-neutral-300 hover:bg-white/5"
            aria-label="Toggle menu"
          >
            {menuOpen ? <X className="w-5 h-5" /> : <Menu className="w-5 h-5" />}
          </button>
        </div>

        {menuOpen && (
          <div className="md:hidden border-t border-white/5 bg-neutral-950/90 backdrop-blur-xl">
            <div className="px-6 py-4 flex flex-col gap-1">
              {navLinks.map((l) => (
                <a
                  key={l.label}
                  href={l.href}
                  onClick={(e) => handleNavClick(e, l.href)}
                  className="px-3 py-2.5 text-sm text-neutral-300 hover:text-white hover:bg-white/5 rounded-md"
                >
                  {l.label}
                </a>
              ))}
              <a
                href="#contact"
                onClick={(e) => handleNavClick(e, "#contact")}
                className="mt-2 px-3 py-2.5 text-sm font-medium text-neutral-950 bg-white rounded-md text-center"
              >
                Start a project
              </a>
            </div>
          </div>
        )}
      </nav>

      {/* ===================== HERO ===================== */}
      <section
        id="home"
        className="relative z-10 pt-40 pb-32 px-6 lg:px-10 max-w-7xl mx-auto scroll-mt-24"
      >
        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-white/10 bg-white/5 backdrop-blur-md text-xs text-neutral-400 mb-8">
          <span className="relative flex h-1.5 w-1.5">
            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75" />
            <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-cyan-400" />
          </span>
          Now booking Q3 — 2 slots remaining
        </div>

        <h1 className="text-5xl sm:text-6xl lg:text-7xl font-medium tracking-tight leading-[1.05] max-w-5xl">
          Bridging{" "}
          <span className="text-neutral-500">Retail</span> &amp;{" "}
          <span className="bg-gradient-to-r from-cyan-300 via-cyan-400 to-blue-500 bg-clip-text text-transparent">
            Digital Innovation
          </span>
        </h1>

        <p className="mt-8 text-lg text-neutral-400 max-w-2xl leading-relaxed">
          A boutique engineering studio building the systems behind modern
          commerce — from headless storefronts and POS integrations to AI agents
          that quietly run your operations.
        </p>

        <div className="mt-10 flex flex-wrap items-center gap-3">
          <a
            href="#services"
            onClick={(e) => handleNavClick(e, "#services")}
            className="group inline-flex items-center gap-2 bg-white text-neutral-950 hover:bg-cyan-300 transition-colors px-5 py-3 rounded-md text-sm font-medium"
          >
            Explore services
            <ArrowUpRight className="w-4 h-4 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" />
          </a>
          <a
            href="#lab"
            onClick={(e) => handleNavClick(e, "#lab")}
            className="inline-flex items-center gap-2 border border-white/10 hover:border-white/20 hover:bg-white/5 transition-colors px-5 py-3 rounded-md text-sm font-medium text-neutral-200"
          >
            Visit the lab
          </a>
        </div>

        {/* Stat strip */}
        <div className="mt-24 grid grid-cols-2 md:grid-cols-4 gap-px bg-white/5 border border-white/5 rounded-xl overflow-hidden">
          {[
            { v: "40+", l: "Shopify deployments" },
            { v: "12", l: "AI agents in production" },
            { v: "99.97%", l: "Uptime across systems" },
            { v: "8 yrs", l: "Building commerce tools" },
          ].map((s) => (
            <div
              key={s.l}
              className="bg-neutral-950 px-6 py-6"
            >
              <div className="text-2xl font-medium tracking-tight text-white">
                {s.v}
              </div>
              <div className="mt-1 text-xs text-neutral-500 uppercase tracking-wider">
                {s.l}
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* ===================== SERVICES ===================== */}
      <section
        id="services"
        className="relative z-10 py-32 px-6 lg:px-10 max-w-7xl mx-auto scroll-mt-24"
      >
        <div className="flex items-end justify-between flex-wrap gap-6 mb-16">
          <div>
            <div className="flex items-center gap-2 text-xs text-cyan-400 uppercase tracking-[0.2em] mb-4">
              <Zap className="w-3.5 h-3.5" />
              Specialized Services
            </div>
            <h2 className="text-4xl sm:text-5xl font-medium tracking-tight max-w-2xl">
              Two disciplines.{" "}
              <span className="text-neutral-500">One studio.</span>
            </h2>
          </div>
          <p className="text-sm text-neutral-400 max-w-sm leading-relaxed">
            We don't do everything. We do two things deeply — the parts of
            modern retail that are hardest to get right.
          </p>
        </div>

        <div className="grid md:grid-cols-2 gap-6">
          {services.map((s) => {
            const Icon = s.icon;
            return (
              <div
                key={s.title}
                className="group relative rounded-2xl border border-white/10 bg-white/[0.03] backdrop-blur-2xl p-8 lg:p-10 overflow-hidden hover:border-white/20 transition-all duration-500"
              >
                {/* hover glow */}
                <div className="pointer-events-none absolute -top-24 -right-24 w-72 h-72 bg-cyan-500/10 blur-3xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700" />
                {/* top hairline */}
                <div className="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent" />

                <div className="relative">
                  <div className="flex items-start justify-between mb-8">
                    <div className="w-12 h-12 rounded-xl border border-white/10 bg-white/5 backdrop-blur-md flex items-center justify-center group-hover:border-cyan-400/30 group-hover:bg-cyan-400/5 transition-colors">
                      <Icon
                        className="w-5 h-5 text-cyan-300"
                        strokeWidth={1.75}
                      />
                    </div>
                    <span className="text-[10px] uppercase tracking-[0.18em] text-neutral-500 border border-white/10 rounded-full px-2.5 py-1">
                      {s.tag}
                    </span>
                  </div>

                  <h3 className="text-2xl font-medium tracking-tight text-white">
                    {s.title}
                  </h3>
                  <p className="mt-4 text-sm text-neutral-400 leading-relaxed">
                    {s.description}
                  </p>

                  <ul className="mt-8 space-y-3 border-t border-white/5 pt-6">
                    {s.capabilities.map((c) => (
                      <li
                        key={c}
                        className="flex items-center gap-3 text-sm text-neutral-300"

                    <Field label="Email" required>

                  {/* Scope checkboxes */}

                        "New website",
                        "Shopify or POS integration",
                        "Custom AI agent",
                        "Maintenance & growth plan",
                        "Something else",

                        const active = form.scope.includes(opt);
                        return (
                          <button
                            type="button"
                            key={opt}
                            onClick={() => toggleScope(opt)}
                            className={`flex items-center gap-2.5 px-3.5 py-2.5 rounded-lg border text-sm text-left transition-all ${

                            <span
                              className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 transition-colors ${
                                active
                                  ? "border-cyan-400 bg-cyan-400"
                                  : "border-white/20"
                              }`}
                            >
                              {active && (
                                <Check
                                  className="w-3 h-3 text-neutral-950"
                                  strokeWidth={3}
                                />
                              )}
                            </span>
                            {opt}
                          </button>

                      })}
                    </div>
                  </Field>

                  {/* Row 3: timeline + budget */}
                  <div className="grid sm:grid-cols-2 gap-4">
                    <Field label="Timeline">
                      <select
                        value={form.timeline}
                        onChange={(e) =>
                          updateField("timeline", e.target.value)
                        }
                        className={selectClass}
                      >
                        <option value="" disabled>
                          When do you need this?
                        </option>
                        <option>ASAP</option>
                        <option>1–3 months</option>
                        <option>3–6 months</option>
                        <option>Just exploring</option>
                      </select>
                    </Field>
                    <Field label="Estimated budget">
                      <select
                        value={form.budget}
                        onChange={(e) => updateField("budget", e.target.value)}
                        className={selectClass}
                      >
                        <option value="" disabled>
                          Pick a range
                        </option>
                        <option>Under $5K</option>
                        <option>$5K – $15K</option>
                        <option>$15K – $30K</option>
                        <option>$30K+</option>
                        <option>Not sure yet</option>
                      </select>
                    </Field>
                  </div>

                  {/* Message */}
                  <Field
                    label="Tell us about your project"
                    hint="A few lines is plenty"
                  >
                    <textarea
                      rows={5}
                      value={form.message}
                      onChange={(e) => updateField("message", e.target.value)}
                      placeholder="What are you trying to accomplish? What's not working today? Any platforms you're already using?"
                      className={`${inputClass} resize-none`}
                    />
                  </Field>

                  {submitError && (
                    <div className="text-xs text-rose-300 bg-rose-400/5 border border-rose-400/20 rounded-lg px-3 py-2">
                      {submitError}{" "}
                      <a
                        href={buildLeadMailto(buildLeadPayload())}
                        className="underline hover:text-rose-200"
                      >
                        Email {LINDY_CONFIG.leadEmail}
                      </a>
                    </div>
                  )}

                  <div className="flex flex-col sm:flex-row sm:items-center gap-4 pt-2">
                    <button
                      type="submit"
                      disabled={submitting}
                      className="group inline-flex items-center justify-center gap-2 bg-white text-neutral-950 hover:bg-cyan-300 disabled:opacity-60 disabled:cursor-not-allowed transition-colors px-6 py-3 rounded-md text-sm font-medium"
                    >
                      {submitting ? "Sending…" : "Send request"}
                      <Send className="w-4 h-4 group-hover:translate-x-0.5 transition-transform" />
                    </button>
                    <span className="text-xs text-neutral-500">
                      Routed straight to my AI assistant, Lindy. We'll never
                      share your details.
                    </span>
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      </section>

      {/* ===================== FOOTER ===================== */}
      <footer className="relative z-10 border-t border-white/5">
        <div className="max-w-7xl mx-auto px-6 lg:px-10 py-6 flex items-center justify-between text-xs text-neutral-600">
          <span>© 2026 Ataraxia Studio. All rights reserved.</span>
          <span className="font-mono">v1.0.0 · built with care</span>
        </div>
      </footer>

      {/* ===================== LINDY CONCIERGE ===================== */}
      <LindyConcierge open={chatOpen} setOpen={setChatOpen} />
    </div>
  );
}

// Multi-select pill-style checkboxes (matches Portfolio scope picker)
function MultiPicker({ value = [], options, onChange, columns = 2 }) {
  const toggle = (opt) =>
    onChange(value.includes(opt) ? value.filter((x) => x !== opt) : [...value, opt]);
  const cols =
    columns === 3 ? "sm:grid-cols-3" : columns === 1 ? "" : "sm:grid-cols-2";
  return (
    <div className={`grid ${cols} gap-2`}>
      {options.map((opt) => {
        const active = value.includes(opt);
        return (
          <button
            type="button"
            key={opt}
            onClick={() => toggle(opt)}
            className={`flex items-center gap-2.5 px-3.5 py-2.5 rounded-lg border text-sm text-left transition-all ${
              active
                ? "border-cyan-400/40 bg-cyan-400/[0.08] text-white"
                : "border-white/10 bg-white/[0.02] text-neutral-300 hover:border-white/20 hover:bg-white/[0.04]"
            }`}
          >
            <span
              className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 transition-colors ${
                active ? "border-cyan-400 bg-cyan-400" : "border-white/20"
              }`}
            >
              {active && (
                <Check className="w-3 h-3 text-neutral-950" strokeWidth={3} />
              )}
            </span>
            {opt}
          </button>
        );
      })}
    </div>
  );
}

// Read ?intent=... from the URL safely (works in artifact + browser)
function getIntentFromUrl() {
  if (typeof window === "undefined") return DEFAULT_INTENT;
  try {
    const params = new URLSearchParams(window.location.search);
    const k = params.get("intent");
    if (k && INTENTS[k]) return k;
  } catch (_) {
    /* ignore */
  }
  return DEFAULT_INTENT;
}

                  Expect a text or email shortly.
                </span>
              </p>
              {(isHighPriorityLead(form.businessType) || intent.flagPriority) && (
                <div className="mt-5 inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-cyan-400/30 bg-cyan-400/5 text-xs text-cyan-200">
                  <Zap
                    className="w-3 h-3 text-cyan-300"
                    strokeWidth={2.5}
                  />
                  Flagged High Priority — same-day human follow-up
                </div>
              )}
              <div className="mt-8 flex flex-wrap items-center justify-center gap-3">
                <a
                  href="/#home"
                  className="inline-flex items-center gap-2 text-sm text-neutral-300 hover:text-white border border-white/10 hover:border-white/20 hover:bg-white/5 transition-colors px-4 py-2 rounded-md"
                >
                  <ArrowLeft className="w-3.5 h-3.5" />
                  Back to site
                </a>
                <button
                  onClick={() => {
                    setSubmitted(false);
                    setSubmitError("");
                  }}
                  className="inline-flex items-center gap-2 text-sm text-neutral-300 hover:text-white border border-white/10 hover:border-white/20 hover:bg-white/5 transition-colors px-4 py-2 rounded-md"
                >
                  Submit another request
                </button>
              </div>
            </div>
          ) : (
            <form onSubmit={handleSubmit} className="relative space-y-10">
              {/* Plan summary card (only on operator intents) */}
              {intent.plan && (
                <div className="rounded-xl border border-cyan-400/25 bg-gradient-to-br from-cyan-400/[0.06] to-white/[0.01] p-4 flex items-center gap-4">
                  <div className="w-10 h-10 rounded-lg border border-cyan-400/30 bg-cyan-400/10 flex items-center justify-center flex-shrink-0">
                    <ShieldCheck
                      className="w-5 h-5 text-cyan-300"
                      strokeWidth={1.75}
                    />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-white">
                      Onboarding to {intent.plan}
                    </div>
                    <div className="text-xs text-neutral-400 mt-0.5">
                      {intent.price} · cancel anytime · no annual contract
                    </div>
                  </div>
                  <span className="text-[10px] uppercase tracking-[0.18em] text-cyan-300 border border-cyan-400/30 bg-cyan-400/10 rounded-full px-2.5 py-1 hidden sm:inline">
                    Selected plan
                  </span>
                </div>
              )}

              {/* Hidden lead-priority indicator */}
              <input
                type="hidden"
                name="lead_priority"
                value={
                  isHighPriorityLead(form.businessType) || intent.flagPriority
                    ? "HIGH"
                    : "STANDARD"
                }
              />
              <input type="hidden" name="intent" value={intent.key} />

              {/* Render each section in the intent's order */}
              {intent.sections.map((sectionKey, i) => {
                const renderer = renderers[sectionKey];
                if (!renderer) return null;
                const idx = String(i + 1).padStart(2, "0");
                return <div key={sectionKey}>{renderer(idx)}</div>;
              })}

              {submitError && (
                <div className="text-xs text-rose-300 bg-rose-400/5 border border-rose-400/20 rounded-lg px-3 py-2">
                  {submitError}{" "}
                  <a
                    href={buildLeadMailto(buildLeadPayload())}
                    className="underline hover:text-rose-200"
                  >
                    Email {LINDY_CONFIG.leadEmail}
                  </a>
                </div>
              )}

              <div className="flex flex-col sm:flex-row sm:items-center gap-4 pt-4 border-t border-white/5">
                <button
                  type="submit"
                  disabled={submitting}
                  className="group inline-flex items-center justify-center gap-2 bg-white text-neutral-950 hover:bg-cyan-300 disabled:opacity-60 disabled:cursor-not-allowed transition-colors px-6 py-3 rounded-md text-sm font-medium"
                >
                  {submitting ? "Sending…" : intent.submitLabel}
                  <Send className="w-4 h-4 group-hover:translate-x-0.5 transition-transform" />
                </button>
                <span className="text-xs text-neutral-500">
                  Routed straight to my AI assistant, Lindy. We'll never share
                  your details.
                </span>
              </div>
            </form>
          )}
        </div>

        {/* Footer reassurance */}
        <div className="mt-8 flex items-center justify-between text-xs text-neutral-600 px-2">
          <span className="inline-flex items-center gap-2">
            <Mail className="w-3 h-3" />
            Or email{" "}
            <a
              href={`mailto:${LINDY_CONFIG.leadEmail}`}
              className="text-neutral-400 hover:text-cyan-300 transition-colors"
            >
              {LINDY_CONFIG.leadEmail}
            </a>{" "}
            directly.
          </span>
          <span className="font-mono hidden sm:inline">
            FORM/{intent.key.toUpperCase()} · v1
          </span>
        </div>
      </section>

      {/* ===================== FOOTER ===================== */}
      <footer className="relative z-10 border-t border-white/5">
        <div className="max-w-7xl mx-auto px-6 lg:px-10 py-6 flex items-center justify-between text-xs text-neutral-600">
          <span>© 2026 Ataraxia Studio. All rights reserved.</span>
          <span className="font-mono">v1.0.0 · built with care</span>
        </div>
      </footer>
    </div>

      __components.Intake = Intake;

    // ===== Router shell =====
    function App() {
      const initial = (() => {
        const sp = new URLSearchParams(window.location.search);
        if (sp.get("page") === "intake") {
          return { page: "intake", intent: sp.get("intent") || "discuss" };
        }
        return { page: "home" };
      })();
      const [view, setView] = useState(initial);

      const viewRef = useRef(view);
      useEffect(() => {
        viewRef.current = view;
        const pg = document.getElementById("rd-page");
        if (pg) pg.textContent = view.page === "intake" ? "intake?" + view.intent : "home";
      }, [view]);

      const setLast = (msg, kind) => {
        const el = document.getElementById("rd-last");
        if (el) el.textContent = msg;
        const log = document.getElementById("rd-log");
        if (log) {
          const div = document.createElement("div");
          if (kind) div.className = kind;
          const t = new Date();
          const ts = String(t.getMinutes()).padStart(2,"0") + ":" + String(t.getSeconds()).padStart(2,"0") + "." + String(t.getMilliseconds()).padStart(3,"0").slice(0,2);
          div.textContent = ts + "  " + msg;
          log.insertBefore(div, log.firstChild);
          while (log.children.length > 30) log.removeChild(log.lastChild);
        }
        console.log("[router]", msg);
      };

      // Safe wrapper for history.replaceState — throws on file:// when path
      // changes, so we swallow the error (URL rewriting is decorative).
      const safeReplaceState = (url) => {
        try {
          window.history.replaceState(null, "", url);
          return true;
        } catch (err) {
          setLast("replaceState(" + url + ") blocked: " + err.name, "warn");
          return false;
        }
      };

      // Bullet-proof scroll: polls for the element until it appears (max ~1.5s),
      // then scrolls. Works whether the target is already in DOM or about to be.
      const scrollToIdWhenReady = (id, label) => {
        const lab = label || "scroll";
        const start = performance.now();
        let attempts = 0;
        const tick = () => {
          attempts++;
          const el = document.getElementById(id);
          if (el) {
            const top = Math.max(0, el.getBoundingClientRect().top + window.pageYOffset - 96);
            window.scrollTo({ top, behavior: "smooth" });
            try { el.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (_) {}
            setLast(lab + " ✓ #" + id + " top=" + Math.round(top) + " (try " + attempts + ", " + Math.round(performance.now()-start) + "ms)", "ok");
            return;
          }
          if (performance.now() - start > 1500) {
            setLast(lab + " ✗ #" + id + " never appeared (" + attempts + " tries)", "err");
            return;
          }
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      };

      // Expose for the test buttons + devtools manual testing
      window.__router = {
        scroll: (id) => {
          setLast("__router.scroll(" + id + ") page=" + viewRef.current.page);
          if (viewRef.current.page !== "home") {
            safeReplaceState("#" + id);
            setView({ page: "home" });
          }
          scrollToIdWhenReady(id, "btn");
        },
        go: (page, intent) => {
          setLast("__router.go(" + page + (intent ? "," + intent : "") + ")");
          if (page === "intake") {
            safeReplaceState("?page=intake&intent=" + (intent || "discuss"));
            setView({ page: "intake", intent: intent || "discuss" });
          } else {
            safeReplaceState("#home");
            setView({ page: "home" });
          }
          window.scrollTo(0, 0);
        },
        getView: () => viewRef.current,
        setLast,
      };

      useEffect(() => {
        let clickCount = 0;
        const onClick = (e) => {
          clickCount++;
          const cnt = document.getElementById("rd-clicks");
          if (cnt) cnt.textContent = String(clickCount);

          const a = e.target.closest && e.target.closest("a");
          if (!a) {
            return; // not an anchor — count only
          }
          const href = a.getAttribute("href");
          if (!href) { setLast("click <a> no href", "warn"); return; }
          if (a.target === "_blank") { setLast("skip _blank: " + href); return; }
          if (/^(mailto:|tel:|sms:)/i.test(href)) { setLast("skip mailto: " + href); return; }
          if (/^https?:/i.test(href)) { setLast("skip external: " + href); return; }
          if (a.hasAttribute("download")) { setLast("skip download: " + href); return; }

          const currentPage = viewRef.current.page;
          setLast("CLICK href=" + href + " on=" + currentPage);

          // Always block default + bubble for our internal navs, then route
          const route = (action) => {
            e.preventDefault();
            e.stopImmediatePropagation();
            action();
          };

          if (href.startsWith("/intake")) {
            return route(() => {
              try {
                const qs = href.includes("?") ? href.split("?")[1] : "";
                const intent = new URLSearchParams(qs).get("intent") || "discuss";
                safeReplaceState("?page=intake&intent=" + intent);
                setView({ page: "intake", intent });
                window.scrollTo(0, 0);
                setLast("→ intake?" + intent, "ok");
              } catch (err) {
                setLast("intake route error: " + err.message, "err");
              }
            });
          }

          // Determine the target section id from the href
          let targetId = null;
          if (href === "/lab") targetId = "lab";
          else if (href.startsWith("#") && href.length > 1) targetId = href.slice(1);
          else if (href === "/" || href === "/#") targetId = "home";
          else if (href.startsWith("/#")) targetId = href.slice(2);

          if (targetId) {
            return route(() => {
              try {
                if (currentPage !== "home") {
                  setLast("→ switching intake → home for #" + targetId, "warn");
                  safeReplaceState("#" + targetId);
                  setView({ page: "home" });
                } else {
                  safeReplaceState("#" + targetId);
                }
                scrollToIdWhenReady(targetId, currentPage === "home" ? "nav" : "nav-cross");
              } catch (err) {
                setLast("nav route error: " + err.message, "err");
              }
            });
          }

          setLast("UNHANDLED " + href, "err");
        };
        document.addEventListener("click", onClick, true);
        setLast("listener installed", "ok");
        return () => document.removeEventListener("click", onClick, true);
      }, []);

      useEffect(() => {
        const onPop = () => {
          const sp = new URLSearchParams(window.location.search);
          if (sp.get("page") === "intake") {
            setView({ page: "intake", intent: sp.get("intent") || "discuss" });
          } else {
            setView({ page: "home" });
          }
        };
        window.addEventListener("popstate", onPop);
        return () => window.removeEventListener("popstate", onPop);
      }, []);

      if (view.page === "intake") {
        const Intake = __components.Intake;
        return <Intake key={view.intent} />;
      }
      const Portfolio = __components.Portfolio;
      return <Portfolio />;
    }

    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
